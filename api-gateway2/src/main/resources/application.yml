server:
  port: 8081

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8082
          predicates:
            - Path=/auth/**

        - id: catalog-service
          uri: http://catalog-service:8083
          predicates:
            - Path=/catalog/**

        - id: order-service
          uri: http://order-service:8084
          predicates:
            - Path=/orders/**

# HU10 - Salud
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

# Desactiva Eureka para evitar errores de conexión
eureka:
  client:
    enabled: false