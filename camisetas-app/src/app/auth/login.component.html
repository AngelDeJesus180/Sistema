<div class="login-page">
  <div class="login-bg"><div class="grid-overlay"></div></div>

  <div class="login-card fade-in">
    <div class="brand">
      <span class="brand-icon">◈</span>
      <h1 class="brand-name">CAMISETAS</h1>
      <p class="brand-sub">STORE</p>
    </div>

    <div class="tabs">
      <button class="tab" [class.active]="mode === 'login'" (click)="setMode('login')">ENTRAR</button>
      <button class="tab" [class.active]="mode === 'register'" (click)="setMode('register')">REGISTRARSE</button>
    </div>

    <form *ngIf="mode === 'login'" [formGroup]="loginForm" (ngSubmit)="onLogin()" class="login-form">
      <div class="field">
        <label>Usuario</label>
        <input type="text" formControlName="username" placeholder="tu usuario"/>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" formControlName="password" placeholder="••••••••"/>
      </div>
      <div class="error-msg" *ngIf="error">{{ error }}</div>
      <button type="submit" class="btn-primary" [disabled]="loading || loginForm.invalid">
        <span *ngIf="!loading">ENTRAR</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </form>

    <form *ngIf="mode === 'register'" [formGroup]="registerForm" (ngSubmit)="onRegister()" class="login-form">
      <div class="field">
        <label>Usuario</label>
        <input type="text" formControlName="username" placeholder="elige un usuario"/>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" formControlName="password" placeholder="mínimo 4 caracteres"/>
      </div>
      <div class="field">
        <label>Confirmar Contraseña</label>
        <input type="password" formControlName="confirmPassword" placeholder="repite la contraseña"/>
      </div>
      <div class="error-msg" *ngIf="error">{{ error }}</div>
      <div class="success-msg" *ngIf="successMsg">{{ successMsg }}</div>
      <button type="submit" class="btn-primary" [disabled]="loading || registerForm.invalid">
        <span *ngIf="!loading">CREAR CUENTA</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </form>
  </div>
</div>
